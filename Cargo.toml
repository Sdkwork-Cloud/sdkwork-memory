[workspace]
resolver = "2"
members = [
  "crates/sdkwork-memory-spi",
  "crates/sdkwork-memory-runtime",
  "crates/sdkwork-memory-test-support",
  "plugins/sdkwork-memory-plugin-native-sql",
]

[workspace.package]
edition = "2021"
version = "0.1.0"
license = "UNLICENSED"

[workspace.dependencies]
async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
