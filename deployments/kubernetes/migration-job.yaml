apiVersion: batch/v1
kind: Job
metadata:
  name: sdkwork-memory-db-migrate
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: database-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-memory
        app.kubernetes.io/component: database-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          image: sdkwork-memory-api-server:latest
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sdkwork-memory-api-server", "db-migrate"]
          env:
            - name: SDKWORK_MEMORY_APP_ROOT
              value: /app
            - name: SDKWORK_MEMORY_ENVIRONMENT
              value: production
            - name: SDKWORK_MEMORY_DATABASE_AUTO_MIGRATE
              value: "true"
            - name: SDKWORK_MEMORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-database
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
