apiVersion: batch/v1
kind: Job
metadata:
  name: sdkwork-memory-db-migrate
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: database-migrate
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-memory
        app.kubernetes.io/component: database-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-migrate
          # Pin by digest in production: replace <release-build-digest> with the actual sha256.
          image: sdkwork-api-memory-standalone-gateway:latest@sha256:<release-build-digest>
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/sdkwork-api-memory-standalone-gateway", "db-migrate"]
          env:
            - name: SDKWORK_MEMORY_APP_ROOT
              value: /app
            - name: SDKWORK_MEMORY_ENVIRONMENT
              value: production
            - name: SDKWORK_MEMORY_DATABASE_AUTO_MIGRATE
              value: "true"
            - name: SDKWORK_MEMORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-database
                  key: database-url
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
