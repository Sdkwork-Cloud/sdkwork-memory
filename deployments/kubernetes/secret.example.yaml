# Example secrets for sdkwork-memory production rollout.
# Replace placeholder values in your secret manager; do not commit real credentials.
---
apiVersion: v1
kind: Secret
metadata:
  name: sdkwork-memory-database
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: database
type: Opaque
stringData:
  database-url: postgresql://memory_user:REPLACE_ME@memory-postgres:5432/memory?sslmode=require
---
apiVersion: v1
kind: Secret
metadata:
  name: sdkwork-memory-iam-database
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: iam-database
type: Opaque
stringData:
  database-url: postgresql://iam_user:REPLACE_ME@iam-postgres:5432/iam?sslmode=require
---
apiVersion: v1
kind: Secret
metadata:
  name: sdkwork-memory-drive
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: drive-export
type: Opaque
stringData:
  # Required when Drive-backed privacy exports are enabled.
  database-url: postgresql://drive_user:REPLACE_ME@drive-postgres:5432/drive?sslmode=require
  # Production object store (S3-compatible). Omit s3-endpoint for local filesystem exports.
  s3-endpoint: https://s3.example.com
  s3-region: us-east-1
  s3-bucket: memory
  s3-access-key-id: REPLACE_ME
  s3-secret-access-key: REPLACE_ME
