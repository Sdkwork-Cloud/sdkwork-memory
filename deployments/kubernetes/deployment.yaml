apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-memory-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: standalone-gateway
    app.kubernetes.io/part-of: sdkwork-memory
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-memory
      app.kubernetes.io/component: standalone-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-memory
        app.kubernetes.io/component: standalone-gateway
        app.kubernetes.io/part-of: sdkwork-memory
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: sdkwork-memory
                    app.kubernetes.io/component: standalone-gateway
                topologyKey: kubernetes.io/hostname
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sdkwork-memory
              app.kubernetes.io/component: standalone-gateway
      containers:
        - name: standalone-gateway
          # Pin by digest in production: replace <release-build-digest> with the actual sha256.
          # Mutable :latest tags MUST NOT be used in production (per RELEASE_SPEC §4.1).
          image: sdkwork-memory-standalone-gateway:latest@sha256:<release-build-digest>
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SDKWORK_MEMORY_APP_ROOT
              value: /app
            - name: SDKWORK_MEMORY_ENVIRONMENT
              value: production
            - name: SDKWORK_MEMORY_CONFIG_PROFILE
              value: production
            - name: SDKWORK_MEMORY_DEPLOYMENT_PROFILE
              value: cloud
            - name: SDKWORK_MEMORY_SERVICE_LAYOUT
              value: unified-process
            - name: SDKWORK_MEMORY_RUNTIME_TARGET
              value: container
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: SDKWORK_MEMORY_APPLICATION_PUBLIC_INGRESS_BIND
              value: "0.0.0.0:8080"
            # API rate limits (per-pod).
            - name: SDKWORK_MEMORY_MAX_BODY_BYTES
              value: "1048576"
            - name: SDKWORK_MEMORY_MAX_CONCURRENCY
              value: "256"
            # Database connection pool tuning.
            - name: SDKWORK_MEMORY_DB_MAX_CONNECTIONS
              value: "20"
            - name: SDKWORK_MEMORY_DB_MIN_CONNECTIONS
              value: "5"
            # SDKWORK_MEMORY_SNOWFLAKE_NODE_ID is intentionally NOT set here.
            # The Memory service now uses database-backed node_id allocation
            # via sdkwork_node_registry, which automatically assigns unique
            # node IDs per pod. See DATABASE_SPEC §6.10.
            - name: SDKWORK_MEMORY_DATABASE_AUTO_MIGRATE
              value: "false"
            - name: SDKWORK_MEMORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-database
                  key: database-url
            - name: SDKWORK_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-iam-database
                  key: database-url
          startupProbe:
            httpGet:
              path: /readyz
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: app-tmp
              mountPath: /app/tmp
      volumes:
        - name: tmp
          emptyDir: {}
        - name: app-tmp
          emptyDir: {}
      terminationGracePeriodSeconds: 30
