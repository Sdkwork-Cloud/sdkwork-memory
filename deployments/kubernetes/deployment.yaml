apiVersion: apps/v1
kind: Deployment
metadata:
  name: sdkwork-memory-api-server
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: sdkwork-memory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sdkwork-memory
      app.kubernetes.io/component: api-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sdkwork-memory
        app.kubernetes.io/component: api-server
        app.kubernetes.io/part-of: sdkwork-memory
    spec:
      containers:
        - name: api-server
          image: sdkwork-memory-api-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: SDKWORK_MEMORY_APP_ROOT
              value: /app
            - name: SDKWORK_MEMORY_ENVIRONMENT
              value: production
            - name: SDKWORK_MEMORY_CONFIG_PROFILE
              value: production
            - name: SDKWORK_MEMORY_DEPLOYMENT_PROFILE
              value: standalone
            - name: SDKWORK_MEMORY_SERVICE_LAYOUT
              value: unified-process
            - name: SDKWORK_MEMORY_RUNTIME_TARGET
              value: container
            - name: SDKWORK_MEMORY_APPLICATION_PUBLIC_INGRESS_BIND
              value: "0.0.0.0:8080"
            - name: SDKWORK_MEMORY_SNOWFLAKE_NODE_ID
              value: "1"
            - name: SDKWORK_MEMORY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-database
                  key: database-url
            - name: SDKWORK_IAM_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sdkwork-memory-iam-database
                  key: database-url
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
