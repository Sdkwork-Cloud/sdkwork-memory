apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sdkwork-memory-api-server
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: api-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sdkwork-memory-api-server
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
