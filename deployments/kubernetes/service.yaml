apiVersion: v1
kind: Service
metadata:
  name: sdkwork-api-memory-standalone-gateway
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: standalone-gateway
    app.kubernetes.io/part-of: sdkwork-memory
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: /metrics
    prometheus.io/port: "8080"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: standalone-gateway
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
