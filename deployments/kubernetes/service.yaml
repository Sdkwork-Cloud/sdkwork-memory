apiVersion: v1
kind: Service
metadata:
  name: sdkwork-memory-api-server
  labels:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: api-server
    app.kubernetes.io/part-of: sdkwork-memory
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: sdkwork-memory
    app.kubernetes.io/component: api-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
