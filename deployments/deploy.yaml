version: 1
defaultProfile: cloud.production

profiles:
  cloud.production:
    install:
      layout: binary-package
    expose:
      - domain: memory.sdkwork.com
        tls: sdkwork.com
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: cloud.production
        env: etc/topology/cloud.production.env
      kubernetes:
        reference: deployments/kubernetes/
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
      nginx:
        clientMaxBodySize: 32m

  cloud.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      allowInsecureTls: true
      topology:
        spec: specs/topology.spec.json
        profile: cloud.development
        env: etc/topology/cloud.development.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900

  standalone.production:
    install:
      layout: binary-package
    expose:
      - domain: memory.sdkwork.com
        tls: sdkwork.com
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: standalone.production
        env: etc/topology/standalone.production.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          application.backend-http: http://127.0.0.1:8080
          application.open-http: http://127.0.0.1:8080
          application.app-http: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
      nginx:
        clientMaxBodySize: 32m

  standalone.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      allowInsecureTls: true
      topology:
        spec: specs/topology.spec.json
        profile: standalone.development
        env: etc/topology/standalone.development.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          application.backend-http: http://127.0.0.1:8080
          application.open-http: http://127.0.0.1:8080
          application.app-http: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
