version: 1
defaultProfile: cloud.split-services.production

profiles:
  cloud.split-services.production:
    install:
      layout: binary-package
    expose:
      - domain: memory.sdkwork.com
        tls: sdkwork.com
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: cloud.split-services.production
        env: configs/topology/cloud.split-services.production.env
      kubernetes:
        reference: deployments/kubernetes/
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
      nginx:
        clientMaxBodySize: 32m

  cloud.split-services.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      allowInsecureTls: true
      topology:
        spec: specs/topology.spec.json
        profile: cloud.split-services.development
        env: configs/topology/cloud.split-services.development.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900

  standalone.unified-process.production:
    install:
      layout: binary-package
    expose:
      - domain: memory.sdkwork.com
        tls: sdkwork.com
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      topology:
        spec: specs/topology.spec.json
        profile: standalone.unified-process.production
        env: configs/topology/standalone.unified-process.production.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          application.backend-http: http://127.0.0.1:8080
          application.open-http: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
      nginx:
        clientMaxBodySize: 32m

  standalone.unified-process.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      allowInsecureTls: true
      topology:
        spec: specs/topology.spec.json
        profile: standalone.unified-process.development
        env: configs/topology/standalone.unified-process.development.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          application.backend-http: http://127.0.0.1:8080
          application.open-http: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900

  standalone.split-services.development:
    install:
      layout: source-tree
    expose:
      - domain: localhost
        tls: off
        mode: api
        apiPathStyle: full-prefix
    packages: []
    overrides:
      allowInsecureTls: true
      topology:
        spec: specs/topology.spec.json
        profile: standalone.split-services.development
        env: configs/topology/standalone.split-services.development.env
      proxy:
        upstreams:
          application.public-ingress: http://127.0.0.1:8080
          application.backend-http: http://127.0.0.1:8080
          application.open-http: http://127.0.0.1:8080
          platform.api-gateway: http://127.0.0.1:3900
