name: verify

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile || pnpm install
      - name: Run SDKWork verify
        shell: pwsh
        run: pnpm verify

  postgres-contract:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: memory
          POSTGRES_PASSWORD: memory
          POSTGRES_DB: memory_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run Postgres store contract tests
        env:
          SDKWORK_MEMORY_POSTGRES_TEST_URL: postgres://memory:memory@localhost:5432/memory_test
        run: cargo test -p sdkwork-memory-plugin-native-sql postgres_store_contract -- --nocapture
